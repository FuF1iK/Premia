<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Панель управления переводами</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #101418 0%, #1a1f2c 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-card {
            background: #1e2436;
            border-radius: 32px;
            padding: 32px 28px;
            width: 350px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-card h2 {
            color: white;
            margin-bottom: 24px;
            font-size: 26px;
        }

        .auth-card input {
            width: 100%;
            padding: 14px 16px;
            background: #0f111a;
            border: 1px solid #2d3348;
            border-radius: 24px;
            color: white;
            margin-bottom: 18px;
            outline: none;
            font-size: 16px;
        }

        .auth-card input:focus {
            border-color: #3b82f6;
        }

        .auth-card button {
            background: #3b82f6;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        .error-msg {
            color: #f87171;
            font-size: 13px;
            margin-top: 12px;
        }

        .app-container {
            display: none;
            max-width: 1300px;
            margin: 0 auto;
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active-page {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-card {
            background: #131824;
            border-radius: 32px;
            border: 1px solid #2a2f42;
            padding: 24px;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.3);
        }

        .page-title {
            font-size: 22px;
            font-weight: 600;
            color: #e2e8f0;
            border-left: 4px solid #3b82f6;
            padding-left: 16px;
            margin-bottom: 20px;
        }

        .inline-form {
            background: #0b0e16;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 16px;
            border: 1px solid #292f42;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1 1 150px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8d99ae;
        }

        .form-group input, .form-group select {
            background: #1a1f2c;
            border: 1px solid #2d3448;
            border-radius: 20px;
            padding: 12px 14px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #3b82f6;
        }

        .amount-buttons {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .quick-btn {
            background: #252b3d;
            border: none;
            color: #cbd5e6;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s;
        }

        .quick-btn:hover {
            background: #3b82f6;
            color: white;
        }

        .submit-btn {
            background: #10b981;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        .clear-form-btn {
            background: #6b7280;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        .add-user-btn {
            background: #8b5cf6;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        .add-user-btn:hover {
            background: #7c3aed;
        }

        .clear-table-btn {
            background: #ef4444;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 15px;
            margin-right: 16px;
        }

        .clear-table-btn:hover {
            background: #dc2626;
        }

        .bottom-nav-btn {
            background: #3b82f6;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 16px;
            margin-top: 24px;
            width: 100%;
            transition: 0.2s;
        }

        .bottom-nav-btn:hover {
            background: #2563eb;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            text-align: left;
            padding: 14px 12px;
            border-bottom: 1px solid #252b3d;
        }

        th {
            color: #9ca3af;
            font-weight: 600;
            background: #0c0f18;
        }

        td {
            color: #e5e7eb;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #131824;
            border-radius: 32px;
            border: 1px solid #3b82f6;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2f42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: white;
            font-size: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 28px;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #ef4444;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-body input {
            width: 100%;
            padding: 12px 14px;
            background: #1a1f2c;
            border: 1px solid #2d3448;
            border-radius: 20px;
            color: white;
            margin-bottom: 16px;
            outline: none;
        }

        .modal-btn {
            background: #10b981;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header-buttons {
            display: flex;
            gap: 12px;
        }

        .logout-btn, .view-logs-btn, .sync-status {
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn {
            background: #334155;
        }

        .view-logs-btn {
            background: #8b5cf6;
        }

        .sync-status {
            background: #10b981;
            cursor: default;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .logs-container {
            max-height: 600px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .log-entry {
            background: #0b0e16;
            border-radius: 16px;
            padding: 16px;
            border-left: 4px solid;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .log-time {
            color: #6c7293;
            font-size: 12px;
        }

        .log-user {
            background: #1f2937;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #a5b4fc;
        }

        .log-action {
            font-weight: bold;
            color: #e2e8f0;
            margin-bottom: 6px;
        }

        .log-details {
            color: #9ca3af;
            font-size: 13px;
        }

        .clear-logs-btn {
            background: #ef4444;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        @media (max-width: 780px) {
            .inline-form {
                flex-direction: column;
                align-items: stretch;
            }
            .amount-buttons {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>

<div id="authModal" class="auth-overlay">
    <div class="auth-card">
        <h2>🔐 Вход в систему</h2>
        <input type="text" id="loginInput" placeholder="Логин">
        <input type="password" id="passwordInput" placeholder="Пароль">
        <button id="loginBtn">Войти</button>
        <div id="authError" class="error-msg"></div>
    </div>
</div>

<div id="appMain" class="app-container">
    <div class="user-header">
        <div style="color: white; font-weight: 600;">
            👋 Добро пожаловать, <span id="currentUserDisplay">——</span>
            <span id="syncStatus" class="sync-status" style="margin-left: 12px;">🟢 Синхронизация</span>
        </div>
        <div class="header-buttons">
            <button id="viewLogsBtn" class="view-logs-btn">📋 Логи</button>
            <button id="logoutBtn" class="logout-btn">🚪 Выйти</button>
        </div>
    </div>

    <div id="page1" class="page active-page">
        <div class="page-card">
            <div class="page-title">📋 Управление переводами</div>
            
            <div class="inline-form">
                <div class="form-group">
                    <label>🧾 Выбрать участника</label>
                    <select id="userSelect">
                        <option value="">-- Выберите участника --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🧾 Ник / Имя</label>
                    <input type="text" id="nickInput" placeholder="Или введите новый ник">
                </div>
                <div class="form-group">
                    <label>🆔 Static ID</label>
                    <input type="number" id="staticIdInput" placeholder="283360">
                </div>
                <div class="form-group">
                    <label>💰 Сумма</label>
                    <input type="number" id="amountInput" placeholder="Своя сумма" step="1">
                </div>
                <div class="amount-buttons">
                    <button class="quick-btn" data-amount="10000">+10к</button>
                    <button class="quick-btn" data-amount="15000">+15к</button>
                    <button class="quick-btn" data-amount="82500">+82.5к</button>
                </div>
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <button id="addBtn" class="submit-btn">➕ Добавить</button>
                    <button id="clearFormBtn" class="clear-form-btn">🗑️ Очистить форму</button>
                    <button id="addUserBtn" class="add-user-btn">👤 Добавить участника</button>
                </div>
            </div>
            
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Static ID</th><th>Сумма</th><th>Комментарий (Nick)</th></tr></thead>
                    <tbody id="tableBody"><tr><td colspan="3">Загрузка...</td></tr></tbody>
                </table>
            </div>
            
            <div class="button-group">
                <button id="clearTableBtn" class="clear-table-btn">🗑️ Очистить таблицу</button>
            </div>
            <div class="info-text" style="font-size:12px; margin-top:12px; color:#6b7280;">* При выборе участника из списка автоматически подставляется его Static ID</div>
            
            <button id="copyListBtn" class="bottom-nav-btn">📋 Скопировать список</button>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="page-card">
            <div class="page-title">📜 Лог действий</div>
            <div style="display: flex; justify-content: flex-end; margin-bottom: 16px;">
                <button id="clearLogsBtn" class="clear-logs-btn">🗑️ Очистить логи</button>
            </div>
            <div id="logsContainer" class="logs-container"></div>
            <button id="backFromLogsBtn" class="bottom-nav-btn back-btn" style="margin-top:24px;">⬅️ Вернуться</button>
        </div>
    </div>
</div>

<div id="userModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>➕ Добавить нового участника</h3>
            <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <input type="text" id="newUserName" placeholder="Имя участника (ник)">
            <input type="number" id="newUserStaticId" placeholder="Static ID">
            <button id="saveUserBtn" class="modal-btn">💾 Сохранить</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBm-7FgcmwyG0iaKXmIISnw7T0PJeJ07M",
        authDomain: "paw-transfers.firebaseapp.com",
        databaseURL: "https://paw-transfers-default-rtdb.firebaseio.com",
        projectId: "paw-transfers",
        storageBucket: "paw-transfers.firebasestorage.app",
        messagingSenderId: "444255771838",
        appId: "1:444255771838:web:f3fe2b4d577f40c24552ef"
    };
    
    let database = null;
    let isFirebaseReady = false;
    
    try {
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();
        isFirebaseReady = true;
    } catch(e) { console.warn(e); }

    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return hash.toString(16);
    }

    const encryptedUsers = [
        { loginHash: simpleHash("Tema Paw"), passwordHash: simpleHash("TemaFuFlya"), displayName: "Tema Paw", role: "admin" },
        { loginHash: simpleHash("Polina Paw"), passwordHash: simpleHash("Polina283360Paw"), displayName: "Polina Paw", role: "admin" },
        { loginHash: simpleHash("Andre Paw"), passwordHash: simpleHash("Vipipupka289781"), displayName: "Andre Paw", role: "admin" }
    ];

    const originalData = [
        { staticld: 283360, amount: 712160, comment: "Polina Paw" },
        { staticld: 284628, amount: 75000, comment: "Oleh Soloviov" },
        { staticld: 333876, amount: 280000, comment: "Troy Paw" },
        { staticld: 315244, amount: 45000, comment: "Yan Paw" },
        { staticld: 289781, amount: 210700, comment: "Andre Paw" },
        { staticld: 117942, amount: 246100, comment: "Steve Sunrise" },
        { staticld: 309566, amount: 30000, comment: "llyukha Paw" },
        { staticld: 333153, amount: 97500, comment: "Leon Paw" },
        { staticld: 149404, amount: 15000, comment: "Nezer Paw" },
        { staticld: 298800, amount: 30000, comment: "Kotik Paw" }
    ];

    let tableData = [];
    let actionLogs = [];
    let currentUser = null;
    let currentUserRole = null;

    // DOM элементы
    const authModal = document.getElementById('authModal');
    const appMain = document.getElementById('appMain');
    const loginBtn = document.getElementById('loginBtn');
    const loginInput = document.getElementById('loginInput');
    const passwordInput = document.getElementById('passwordInput');
    const authError = document.getElementById('authError');
    const currentUserSpan = document.getElementById('currentUserDisplay');
    const logoutBtn = document.getElementById('logoutBtn');
    const viewLogsBtn = document.getElementById('viewLogsBtn');
    const syncStatusSpan = document.getElementById('syncStatus');
    const userSelect = document.getElementById('userSelect');
    const nickInput = document.getElementById('nickInput');
    const staticIdInput = document.getElementById('staticIdInput');
    const amountInput = document.getElementById('amountInput');
    const addBtn = document.getElementById('addBtn');
    const clearFormBtn = document.getElementById('clearFormBtn');
    const clearTableBtn = document.getElementById('clearTableBtn');
    const copyListBtn = document.getElementById('copyListBtn');
    const addUserBtn = document.getElementById('addUserBtn');
    const userModal = document.getElementById('userModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const saveUserBtn = document.getElementById('saveUserBtn');
    const newUserName = document.getElementById('newUserName');
    const newUserStaticId = document.getElementById('newUserStaticId');

    // Обновление выпадающего списка участников
    function updateUserSelect() {
        if (!userSelect) return;
        const users = [...new Set(tableData.map(item => ({ name: item.comment, id: item.staticld })))];
        userSelect.innerHTML = '<option value="">-- Выберите участника --</option>';
        users.forEach(user => {
            const option = document.createElement('option');
            option.value = user.id;
            option.textContent = `${user.name} (ID: ${user.id})`;
            userSelect.appendChild(option);
        });
    }

    // При выборе участника из списка
    userSelect.addEventListener('change', () => {
        const selectedId = userSelect.value;
        if (selectedId) {
            const user = tableData.find(item => item.staticld == selectedId);
            if (user) {
                nickInput.value = user.comment;
                staticIdInput.value = user.staticld;
            }
        }
    });

    // Добавление нового участника
    function openAddUserModal() {
        newUserName.value = '';
        newUserStaticId.value = '';
        userModal.classList.add('active');
    }

    function closeUserModal() {
        userModal.classList.remove('active');
    }

    async function saveNewUser() {
        const name = newUserName.value.trim();
        const staticId = parseInt(newUserStaticId.value);
        
        if (!name) { alert("Введите имя участника"); return; }
        if (isNaN(staticId) || staticId <= 0) { alert("Введите корректный Static ID"); return; }
        
        const existing = tableData.find(item => item.staticld === staticId);
        if (existing) {
            alert(`Участник с ID ${staticId} уже существует!`);
            closeUserModal();
            return;
        }
        
        tableData.push({ staticld: staticId, amount: 0, comment: name });
        await saveDataToCloud();
        renderTable();
        updateUserSelect();
        addLog("➕ Добавлен участник", `Добавлен "${name}" с ID ${staticId}`);
        closeUserModal();
        alert(`✅ Участник "${name}" добавлен!`);
    }

    async function loadDataFromCloud() {
        if (isFirebaseReady && database) {
            try {
                syncStatusSpan.innerHTML = '🟡 Синхронизация...';
                const snapshot = await database.ref('tableData').once('value');
                const cloudData = snapshot.val();
                if (cloudData && Array.isArray(cloudData) && cloudData.length > 0) {
                    tableData = cloudData;
                } else {
                    tableData = JSON.parse(JSON.stringify(originalData));
                    await database.ref('tableData').set(tableData);
                }
                syncStatusSpan.innerHTML = '🟢 Синхронизация';
                return;
            } catch(e) { console.warn(e); }
        }
        const saved = localStorage.getItem('table_data');
        tableData = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(originalData));
        syncStatusSpan.innerHTML = '🟡 Локальный режим';
    }

    async function saveDataToCloud() {
        if (isFirebaseReady && database) {
            try {
                await database.ref('tableData').set(tableData);
                syncStatusSpan.innerHTML = '🟢 Синхронизация';
            } catch(e) { syncStatusSpan.innerHTML = '🔴 Ошибка'; }
        } else {
            localStorage.setItem('table_data', JSON.stringify(tableData));
        }
    }

    function subscribeToRealtimeUpdates() {
        if (isFirebaseReady && database) {
            database.ref('tableData').on('value', (snapshot) => {
                const newData = snapshot.val();
                if (newData && Array.isArray(newData)) {
                    tableData = newData;
                    renderTable();
                    updateUserSelect();
                }
            });
        }
    }

    function addLogInternal(user, action, details) {
        const now = new Date();
        const timestamp = now.toLocaleString('ru-RU');
        actionLogs.unshift({ timestamp, user, action, details });
        if (actionLogs.length > 500) actionLogs.pop();
        localStorage.setItem('action_logs', JSON.stringify(actionLogs));
    }

    function addLog(action, details) {
        addLogInternal(currentUser || "Гость", action, details);
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        if (!tbody) return;
        const sorted = [...tableData].sort((a, b) => a.staticld - b.staticld);
        if (sorted.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3">Таблица пуста</td></tr>';
            return;
        }
        let html = '';
        for (let item of sorted) {
            html += `<tr>
                        <td>${item.staticld}</td>
                        <td>${item.amount.toLocaleString()} ₽</td>
                        <td>${escapeHtml(item.comment)}</td>
                     </tr>`;
        }
        tbody.innerHTML = html;
        updateUserSelect();
    }

    function renderLogs() {
        const container = document.getElementById('logsContainer');
        if (!container) return;
        if (actionLogs.length === 0) {
            container.innerHTML = '<div class="empty-state">Логов пока нет</div>';
            return;
        }
        let html = '';
        for (let log of actionLogs) {
            html += `<div class="log-entry" style="border-left-color: #3b82f6;">
                        <div class="log-header">
                            <span class="log-time">🕒 ${log.timestamp}</span>
                            <span class="log-user">👤 ${escapeHtml(log.user)}</span>
                        </div>
                        <div class="log-action">📌 ${escapeHtml(log.action)}</div>
                        <div class="log-details">${escapeHtml(log.details)}</div>
                     </div>`;
        }
        container.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    async function addToTable() {
        let nick = nickInput.value.trim();
        let staticId = parseInt(staticIdInput.value);
        let amount = parseFloat(amountInput.value);
        
        if (!nick) { alert("Введите ник"); return; }
        if (isNaN(staticId) || staticId <= 0) { alert("Введите Static ID"); return; }
        if (isNaN(amount) || amount <= 0) { alert("Введите сумму"); return; }

        const existing = tableData.find(item => item.staticld === staticId);
        if (existing) {
            existing.amount += amount;
            existing.comment = nick;
            addLog("➕ Обновление", `ID ${staticId}, +${amount.toLocaleString()} ₽`);
        } else {
            tableData.push({ staticld: staticId, amount, comment: nick });
            addLog("➕ Добавление", `ID ${staticId}, "${nick}", ${amount.toLocaleString()} ₽`);
        }

        await saveDataToCloud();
        renderTable();
        
        nickInput.value = '';
        staticIdInput.value = '';
        amountInput.value = '';
        alert(`✅ Готово! ID ${staticId}, +${amount.toLocaleString()} ₽`);
    }

    async function clearTable() {
        if (confirm("Очистить таблицу?")) {
            tableData = [];
            await saveDataToCloud();
            renderTable();
            addLog("🗑️ Очистка", "Таблица очищена");
            alert('✅ Таблица очищена');
        }
    }

    function clearForm() {
        nickInput.value = '';
        staticIdInput.value = '';
        amountInput.value = '';
        addLog("🧹 Очистка", "Форма очищена");
    }

    function copyList() {
        let text = '';
        for (let item of tableData) {
            text += `${item.staticld};${item.amount};${item.comment}\n`;
        }
        navigator.clipboard.writeText(text);
        addLog("📋 Копирование", `Скопировано ${tableData.length} записей`);
        alert('✅ Список скопирован!');
    }

    function switchToPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        if (pageId === 'page2') renderLogs();
    }

    function authenticateUser(login, password) {
        const user = encryptedUsers.find(u => u.loginHash === simpleHash(login) && u.passwordHash === simpleHash(password));
        return user ? { success: true, displayName: user.displayName } : { success: false };
    }

    async function attemptLogin() {
        const authResult = authenticateUser(loginInput.value.trim(), passwordInput.value.trim());
        if (authResult.success) {
            currentUser = authResult.displayName;
            currentUserSpan.innerText = currentUser;
            authModal.style.display = "none";
            appMain.style.display = "block";
            await loadDataFromCloud();
            subscribeToRealtimeUpdates();
            const savedLogs = localStorage.getItem('action_logs');
            actionLogs = savedLogs ? JSON.parse(savedLogs) : [];
            renderTable();
            addLogInternal(currentUser, "🔓 Вход", "Успешная авторизация");
        } else {
            authError.innerText = "❌ Неверный логин или пароль";
        }
    }

    function logout() {
        if (currentUser) addLogInternal(currentUser, "🚪 Выход", "Выход из системы");
        currentUser = null;
        authModal.style.display = "flex";
        appMain.style.display = "none";
        loginInput.value = "";
        passwordInput.value = "";
    }

    function clearLogs() {
        actionLogs = [];
        localStorage.setItem('action_logs', JSON.stringify(actionLogs));
        renderLogs();
        alert('✅ Логи очищены');
    }

    addBtn.addEventListener('click', addToTable);
    clearFormBtn.addEventListener('click', clearForm);
    clearTableBtn.addEventListener('click', clearTable);
    copyListBtn.addEventListener('click', copyList);
    addUserBtn.addEventListener('click', openAddUserModal);
    closeModalBtn.addEventListener('click', closeUserModal);
    saveUserBtn.addEventListener('click', saveNewUser);
    userModal.addEventListener('click', (e) => { if (e.target === userModal) closeUserModal(); });
    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', () => amountInput.value = parseInt(btn.dataset.amount));
    });
    viewLogsBtn.addEventListener('click', () => switchToPage('page2'));
    backFromLogsBtn.addEventListener('click', () => switchToPage('page1'));
    clearLogsBtn.addEventListener('click', clearLogs);
    loginBtn.addEventListener('click', attemptLogin);
    logoutBtn.addEventListener('click', logout);
    document.addEventListener('keypress', (e) => { if (authModal.style.display !== 'none' && e.key === 'Enter') attemptLogin(); });
</script>
</body>
</html>
